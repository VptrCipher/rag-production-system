name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # The USERNAME and SPACE_NAME are set from variables to make it easy to copy.
          # You must add these as Repository Variables in GitHub settings!
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Warning: HF_TOKEN is not set in GitHub Secrets. Skipping sync gracefully."
            exit 0
          fi
          
          # We use the explicit HF username provided
          # And the repository name as the Space name
          HF_USERNAME="MadMax046"
          SPACE_NAME="rag-production-system"
          
          git remote add space https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME
          
          # Force push to the space main branch
          git push --force space main
